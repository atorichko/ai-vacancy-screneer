# Unified nginx config for all projects on:
#   https://atorichko.asur-adigital.ru
#
# Goal: one domain config instead of per-project duplicates.
# Keep ONLY this file enabled for the domain to avoid "conflicting server name".
#
# IMPORTANT:
# 1) Adjust upstream ports below to your actual running services.
# 2) Make sure SSL cert exists for atorichko.asur-adigital.ru.

upstream app_ymaps {
    server 127.0.0.1:8502;
}

upstream app_recruitment_frontend {
    server 127.0.0.1:3000;
}

upstream app_recruitment_api {
    server 127.0.0.1:8001;
}

# HTTP on domain -> HTTPS
server {
    listen 80;
    server_name atorichko.asur-adigital.ru;
    return 301 https://$host$request_uri;
}

# Legacy IP redirects for Recruitment MVP only (safe for other services)
server {
    listen 80;
    server_name 185.28.85.131;

    location = /recruitment-mvp {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp/;
    }
    location ^~ /recruitment-mvp/ {
        return 301 https://atorichko.asur-adigital.ru$request_uri;
    }
    location = /recruitment-mvp-api {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp-api/;
    }
    location ^~ /recruitment-mvp-api/ {
        return 301 https://atorichko.asur-adigital.ru$request_uri;
    }
    location = /dashboard {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp/dashboard;
    }
    location ^~ /dashboard/ {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp$uri;
    }
}

server {
    listen 443 ssl http2;
    server_name atorichko.asur-adigital.ru;

    ssl_certificate /etc/letsencrypt/live/atorichko.asur-adigital.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atorichko.asur-adigital.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Main page from static directory.
    root /var/www/main-page;
    index index.html;

    # Root project (/)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static image-resize app from /var/www/images-for-site
    location = /image-resize {
        return 301 /image-resize/;
    }
    location /image-resize/ {
        alias /var/www/images-for-site/frontend/;
        index index.html;
        try_files $uri $uri/ /image-resize/index.html;
    }

    # ymaps app
    location = /ymaps-app {
        return 301 /ymaps-app/;
    }
    location /ymaps-app/ {
        # Keep URI prefix for Streamlit baseUrlPath
        proxy_pass http://app_ymaps;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Recruitment MVP frontend
    location = /recruitment-mvp {
        proxy_pass http://app_recruitment_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location /recruitment-mvp/ {
        proxy_pass http://app_recruitment_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets under mounted prefix
    location /recruitment-mvp/_next/ {
        proxy_pass http://app_recruitment_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Fallback for builds that still request absolute "/_next/*" assets.
    # Keeps styles/scripts working when the app is mounted under /recruitment-mvp.
    location /_next/ {
        proxy_pass http://app_recruitment_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Recruitment MVP API
    location = /recruitment-mvp-api {
        return 301 /recruitment-mvp-api/;
    }
    location /recruitment-mvp-api/ {
        proxy_pass http://app_recruitment_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy dashboard shortcuts
    location = /dashboard {
        return 301 /recruitment-mvp/dashboard;
    }
    location ^~ /dashboard/ {
        return 301 /recruitment-mvp$uri;
    }
}
