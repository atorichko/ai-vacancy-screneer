# Redirect only legacy Recruitment MVP endpoints on IP -> new HTTPS domain.
# This block is intentionally scoped to project routes to avoid breaking other services.
server {
    listen 80;
    server_name 185.28.85.131;

    location = /recruitment-mvp {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp/;
    }
    location ^~ /recruitment-mvp/ {
        return 301 https://atorichko.asur-adigital.ru$request_uri;
    }
    location = /recruitment-mvp-api {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp-api/;
    }
    location ^~ /recruitment-mvp-api/ {
        return 301 https://atorichko.asur-adigital.ru$request_uri;
    }
    location = /dashboard {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp/dashboard;
    }
    location ^~ /dashboard/ {
        return 301 https://atorichko.asur-adigital.ru/recruitment-mvp$uri;
    }
}

# Redirect HTTP on new host -> HTTPS.
server {
    listen 80;
    server_name atorichko.asur-adigital.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name atorichko.asur-adigital.ru;

    # Replace paths with the certificate issued for atorichko.asur-adigital.ru.
    ssl_certificate /etc/letsencrypt/live/atorichko.asur-adigital.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atorichko.asur-adigital.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /recruitment-mvp {
        return 301 /recruitment-mvp/;
    }

    # Frontend app under /recruitment-mvp
    location /recruitment-mvp/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Shortcut to dashboard root.
    location = /dashboard {
        return 301 /recruitment-mvp/dashboard;
    }

    # Shortcut for nested dashboard routes.
    location ^~ /dashboard/ {
        return 301 /recruitment-mvp$uri;
    }

    # Next.js static assets when app served from /recruitment-mvp
    location /recruitment-mvp/_next/ {
        proxy_pass http://127.0.0.1:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /recruitment-mvp-api {
        return 301 /recruitment-mvp-api/;
    }

    # Backend API under /recruitment-mvp-api
    location /recruitment-mvp-api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
