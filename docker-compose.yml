services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recruitment
      POSTGRES_USER: recruitment
      POSTGRES_PASSWORD: recruitment
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
  minio_data:
