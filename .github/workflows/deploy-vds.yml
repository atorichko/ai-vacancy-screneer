name: Deploy to VDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          script: |
            set -euo pipefail
            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi
            APP_DIR="/var/www/recruitment-mvp"
            if [ ! -d "$APP_DIR/.git" ]; then
              $SUDO mkdir -p /var/www
              $SUDO chown -R "$USER:$USER" /var/www || true
              git clone https://github.com/atorichko/ai-vacancy-screneer.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            chmod +x deploy/deploy-on-vds.sh
            APP_DIR="$APP_DIR" BRANCH="main" bash deploy/deploy-on-vds.sh
